name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Coverage summary
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  container-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent-container/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-container

      # The SDK's optional deps include both glibc and musl Linux binaries with
      # no libc constraint, so npm installs both on a glibc runner. The SDK's
      # resolver prefers the musl one and then spawn fails with ENOENT (kernel
      # can't load it). Match the Dockerfile workaround.
      - name: Drop musl variant of Claude Code native binary
        run: rm -rf node_modules/@anthropic-ai/claude-agent-sdk-linux-*-musl
        working-directory: agent-container

      - name: Run typecheck
        run: npx tsc --noEmit
        working-directory: agent-container

      - name: Run container tests
        run: npm test
        working-directory: agent-container
        env:
          SDK_TEST_ANTHROPIC_API_KEY: ${{ secrets.SDK_TEST_ANTHROPIC_API_KEY }}

  container-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container image
        run: docker build -t superagent-container ./agent-container

      - name: Run browser integration tests
        run: ./agent-container/test-browser-integration.sh superagent-container

  e2e-web-tests:
    name: E2E Web (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Web E2E tests
        run: npm run test:e2e:web -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --fail-on-flaky-tests
        env:
          PLAYWRIGHT_WORKERS: 4

  e2e-persistence-tests:
    name: E2E Persistence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run persistence E2E tests
        run: npm run test:e2e:persistence -- --fail-on-flaky-tests

  e2e-stateful-tests:
    name: E2E Stateful
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run stateful E2E tests
        run: npm run test:e2e:stateful -- --fail-on-flaky-tests

  e2e-browser-tests:
    name: E2E Browser Stream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E tests
        run: npm run test:e2e:browser -- --fail-on-flaky-tests

  e2e-auth-tests:
    name: E2E Auth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Auth E2E tests
        run: npm run test:e2e:auth -- --fail-on-flaky-tests

  e2e-a11y-audit:
    name: E2E A11y Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run a11y audit
        continue-on-error: true
        run: npm run test:e2e:a11y -- --fail-on-flaky-tests
